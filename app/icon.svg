<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>

  <!-- Calendar body -->
  <rect x="6" y="10" width="20" height="16" rx="2" fill="none" stroke="white" stroke-width="1.8"/>

  <!-- Calendar top bar -->
  <rect x="6" y="10" width="20" height="5" rx="2" fill="white" opacity="0.25"/>

  <!-- Calendar binding pegs -->
  <line x1="11" y1="7" x2="11" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="7" x2="21" y2="13" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Checkmark -->
  <polyline points="10,19 14,23 22,15" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
